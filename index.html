<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointout Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Fixed UI — outside zoom world so it never moves or scales -->
  <div id="controls">
    <button id="generate-btn" onclick="generate()" style="display:none;">Generate</button>
    <!-- <button id="custom-btn" onclick="toggleCustomMode()">Custom Mode</button> -->
    <div id="clear-undo-row">
      <button id="clear-btn" onclick="clearAll()">Clear All</button>
      <button id="undo-btn" onclick="undo()" title="Undo">&#8592;</button>
      <button id="redo-btn" onclick="redo()" title="Redo">&#8594;</button>
    </div>
    <div id="place-color-row">
      <button id="place-toggle-btn" onclick="togglePlacing()">Placing: ON</button>
      <input type="color" id="dot-color-picker" value="#FFE033" title="Dot colour" />
    </div>
    <button id="options-toggle-btn" onclick="toggleOptions()">Options ▾</button>
    <button id="bg-toggle-btn" onclick="toggleBgPanel()">Background ▾</button>
    <div id="bg-panel" style="display:none; flex-direction:column; gap:6px;">
      <div class="bg-row">
        <button id="bg-file-btn" onclick="document.getElementById('bg-file-input').click()">Upload file</button>
        <input type="file" id="bg-file-input" accept="image/*" style="display:none;" />
      </div>
      <div class="bg-row">
        <input type="text" id="bg-url-input" placeholder="Paste image URL" />
        <button id="bg-url-btn" onclick="loadBgFromURL()">Load</button>
      </div>
      <button id="bg-reset-btn" onclick="resetBg()">Reset</button>
    </div>
    <div id="options-menu" style="display:none; flex-direction:column; gap:10px;">
      <div id="normal-options" style="display:none; flex-direction:column; gap:10px;">
        <label id="kgwo-label"><input type="checkbox" id="kgwo-checkbox" /> KGWO</label>
        <label id="om8-label"><input type="checkbox" id="om8-checkbox" /> 0M8</label>
        <label id="everything-label"><input type="checkbox" id="everything-checkbox" /> Everything</label>
        <label id="traffic-label"><input type="checkbox" id="traffic-checkbox" /> TRAFFIC</label>
      </div>
      <div id="custom-options" style="display:flex; flex-direction:column; gap:10px;">
        <label id="cid-label"><input type="checkbox" id="cid-checkbox" /> CID</label>
        <label id="low-alt-label"><input type="checkbox" id="low-alt-checkbox" /> Low altitude</label>
        <label id="high-alt-label"><input type="checkbox" id="high-alt-checkbox" /> High altitude</label>
        <label id="custom-alt-label">
          <input type="checkbox" id="custom-alt-checkbox" /> Custom altitude
          <select id="custom-alt-select"></select>
        </label>
        <label id="landing-label">
          <input type="checkbox" id="landing-checkbox" /> Landing
          <select id="landing-select">
            <option value="KGWO">KGWO</option>
            <option value="0M8">0M8</option>
            <option value="KVKS">KVKS</option>
            <option value="KJAN">KJAN</option>
            <option value="KTUL">KTUL</option>
            <option value="KHKS">KHKS</option>
            <option value="Custom">Custom</option>
          </select>
          <input type="text" id="landing-custom-input" placeholder="Type here" style="display:none;" />
        </label>
      </div>
    </div>
  </div>

  <div id="share-panel">
    <div class="share-row">
      <button id="load-btn" onclick="toggleLoadInput()">Load Code</button>
      <div id="load-input-row" style="display:none;">
        <input id="load-code" type="text" placeholder="Paste code/URL here" />
        <button id="load-submit-btn" onclick="loadLayout()">Load</button>
      </div>
    </div>
    <div class="share-row">
      <button id="share-btn" onclick="shareLayout()">Share</button>
      <div id="share-output" style="display:none;">
        <input id="share-code" type="text" readonly />
        <button id="copy-btn" onclick="copyCode()">Copy Code</button>
        <button id="copy-url-btn" onclick="copyURL()">Copy URL</button>
      </div>
    </div>
  </div>

  <div id="custom-hint"></div>

  <!-- Zoom world — everything inside here scales/pans -->
  <div id="zoom-viewport">
    <div id="zoom-world">
      <img id="bg-image" src="d66.svg" alt="" />
      <svg id="line-overlay" viewBox="0 0 1078 908" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="custom-overlay"></div>
      <div id="canvas"></div>
    </div>
  </div>

  <canvas id="mask-canvas" style="display:none;"></canvas>
  <canvas id="walls-canvas" style="display:none;"></canvas>
  <canvas id="mask-kgwo-canvas" style="display:none;"></canvas>
  <canvas id="walls-kgwo-canvas" style="display:none;"></canvas>
  <canvas id="mask-om8-canvas" style="display:none;"></canvas>
  <canvas id="walls-om8-canvas" style="display:none;"></canvas>
  <canvas id="mask-traffic-canvas" style="display:none;"></canvas>
  <script src="script.js"></script>
</body>
</html>

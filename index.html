<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointout Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <img id="bg-image" src="d66.png" alt="" />
  <div id="controls">
    <button id="generate-btn" onclick="generate()" style="display:none;">Generate</button>
    <!-- <button id="custom-btn" onclick="toggleCustomMode()">Custom Mode</button> -->
    <div id="clear-undo-row">
      <button id="clear-btn" onclick="clearAll()">Clear All</button>
      <button id="undo-btn" onclick="undo()" title="Undo">&#8592;</button>
      <button id="redo-btn" onclick="redo()" title="Redo">&#8594;</button>
    </div>
    <button id="place-toggle-btn" onclick="togglePlacing()">Placing: ON</button>
    <div id="normal-options" style="display:none; flex-direction:column; gap:10px;">
      <label id="kgwo-label">
        <input type="checkbox" id="kgwo-checkbox" />
        KGWO
      </label>
      <label id="om8-label">
        <input type="checkbox" id="om8-checkbox" />
        0M8
      </label>
      <label id="everything-label">
        <input type="checkbox" id="everything-checkbox" />
        Everything
      </label>
      <label id="traffic-label">
        <input type="checkbox" id="traffic-checkbox" />
        TRAFFIC
      </label>
    </div>
    <div id="custom-options" style="display:flex; flex-direction:column; gap:10px;">
      <label id="cid-label">
        <input type="checkbox" id="cid-checkbox" />
        CID
      </label>
      <label id="low-alt-label">
        <input type="checkbox" id="low-alt-checkbox" />
        Low altitude
      </label>
      <label id="high-alt-label">
        <input type="checkbox" id="high-alt-checkbox" />
        High altitude
      </label>
      <label id="custom-alt-label">
        <input type="checkbox" id="custom-alt-checkbox" />
        Custom altitude
        <select id="custom-alt-select">
          <!-- Options 0-240 in multiples of 10, generated by JS -->
        </select>
      </label>
    </div>
  </div>

  <!-- Share/Load panel — bottom left -->
  <div id="share-panel">
    <div class="share-row">
      <button id="load-btn" onclick="toggleLoadInput()">Load Code</button>
      <div id="load-input-row" style="display:none;">
        <input id="load-code" type="text" placeholder="Paste code/URL here" />
        <button id="load-submit-btn" onclick="loadLayout()">Load</button>
      </div>
    </div>
    <div class="share-row">
      <button id="share-btn" onclick="shareLayout()">Share</button>
      <div id="share-output" style="display:none;">
        <input id="share-code" type="text" readonly />
        <button id="copy-btn" onclick="copyCode()">Copy Code</button>
        <button id="copy-url-btn" onclick="copyURL()">Copy URL</button>
      </div>
    </div>
  </div>

  <svg id="line-overlay" viewBox="0 0 1078 908" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="custom-overlay"></div>
  <div id="custom-hint"></div>
  <div id="canvas"></div>
  <canvas id="mask-canvas" style="display:none;"></canvas>
  <canvas id="walls-canvas" style="display:none;"></canvas>
  <canvas id="mask-kgwo-canvas" style="display:none;"></canvas>
  <canvas id="walls-kgwo-canvas" style="display:none;"></canvas>
  <canvas id="mask-om8-canvas" style="display:none;"></canvas>
  <canvas id="walls-om8-canvas" style="display:none;"></canvas>
  <canvas id="mask-traffic-canvas" style="display:none;"></canvas>
  <script src="script.js"></script>
</body>
</html>
